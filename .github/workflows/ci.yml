name: CI

on:
    pull_request:
        branches: [ main]

jobs:
    test-and-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                enable-cache: true
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"
            
            - name: Install deps
              run: uv sync --frozen

            - name: Run Unit Tests
              env:
                ANTHROPIC_API_KEY: "fake"
                ADMIN_PASSWORD: "fake"
              run: uv run pytest tests/